name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: PyInstaller installeren
        run: pip install pyinstaller

      - name: EXE bouwen
        run: pyinstaller infosphere.spec --clean

      - name: Artifact uploaden
        uses: actions/upload-artifact@v4
        with:
          name: infosphere-converters-windows
          path: dist/infosphere-converters.exe
          retention-days: 30
